name: ci-screenshots

# Renders the game in the Simulator and uploads what it ACTUALLY looks like —
# a tvOS gameplay VIDEO plus iPhone screenshots — so the camera, placement, and
# collision can be reviewed without a Mac. This closes the "flying blind" gap
# that let unseen visual bugs pile up. Secret-free; never signs.
on:
  pull_request:
    paths:
      - 'AmeliaTV/**'
      - '.github/workflows/ci-screenshots.yml'
  push:
    branches:
      - 'claude/**'
    paths:
      - 'AmeliaTV/**'
      - '.github/workflows/ci-screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write   # to publish captures to the ci-screenshots / ci-video branches

concurrency:
  group: ci-screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tvos-video:
    name: tvOS Simulator gameplay video
    runs-on: macos-15
    timeout-minutes: 20   # never let a stuck simulator hang for hours
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest/Contents/Developer"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: AmeliaTV
        run: xcodegen generate

      - name: Build AmeliaTV for the tvOS Simulator
        working-directory: AmeliaTV
        run: |
          xcodebuild build \
            -project AmeliaTV.xcodeproj \
            -scheme AmeliaTV \
            -destination 'generic/platform=tvOS Simulator' \
            -configuration Debug \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO

      - name: Record gameplay video + stills
        working-directory: AmeliaTV
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Debug-appletvsimulator/AmeliaTV.app"
          BUNDLE_ID=$(xcodebuild -project AmeliaTV.xcodeproj -scheme AmeliaTV -showBuildSettings 2>/dev/null \
            | awk -F' = ' '/ PRODUCT_BUNDLE_IDENTIFIER /{print $2; exit}')
          echo "App: $APP"
          echo "Bundle id: $BUNDLE_ID"

          # The app targets tvOS 26, and runners also ship older tvOS runtimes,
          # so pick an Apple TV on the tvOS 26 runtime specifically — and create
          # one if none is pre-made. (Grabbing the first Apple TV got a tvOS 18.5
          # device, which refused to install the app.)
          RT_ID=$(xcrun simctl list runtimes --json \
            | jq -r '.runtimes[] | select(.name|test("tvOS 26")) | .identifier' | head -1)
          echo "tvOS 26 runtime: ${RT_ID:-<none found>}"
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | jq -r --arg rt "$RT_ID" '.devices[$rt][]? | select(.name|test("Apple TV")) | .udid' | head -1)
          if [ -z "$DEVICE_ID" ] && [ -n "$RT_ID" ]; then
            DEVTYPE=$(xcrun simctl list devicetypes --json \
              | jq -r '.devicetypes[] | select(.name|test("Apple TV")) | .identifier' | head -1)
            echo "Creating Apple TV sim ($DEVTYPE) on $RT_ID"
            DEVICE_ID=$(xcrun simctl create "ATV-26" "$DEVTYPE" "$RT_ID")
          fi
          echo "Simulator: $DEVICE_ID"
          [ -n "$DEVICE_ID" ] || { echo "no tvOS 26 Apple TV sim"; xcrun simctl list devices; exit 1; }

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          xcrun simctl install "$DEVICE_ID" "$APP"
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"
          sleep 3   # let the scene present and the demo walk begin

          mkdir -p ../media
          # Record the framebuffer (works headlessly) while the demo walk runs.
          xcrun simctl io "$DEVICE_ID" recordVideo --codec=h264 --force ../media/tvos-gameplay.mp4 &
          REC_PID=$!
          # Also grab periodic stills as a fallback in case the codec misbehaves.
          # The window runs long enough to catch the whole first ride: pick up Pip
          # at the stop, drive to the school, drop off + reward. Stills are reliable
          # even when the video codec tops out early on the simulator.
          prev=0
          for t in 2 6 10 14 18 22 26 30; do
            sleep $((t - prev)); prev=$t
            xcrun simctl io "$DEVICE_ID" screenshot "../media/tvos_$(printf %02d $t)s.png" || true
          done
          # Finalize the recording, then guarantee we never block on it: give
          # recordVideo a few seconds to flush the file after SIGINT, then
          # hard-kill. (Plain `wait` hung headlessly when SIGINT was ignored.)
          kill -INT "$REC_PID" 2>/dev/null || true
          for _ in $(seq 1 10); do kill -0 "$REC_PID" 2>/dev/null || break; sleep 1; done
          kill -9 "$REC_PID" 2>/dev/null || true
          echo "captured:"; ls -la ../media

      - name: Upload media (artifact for humans)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tvos-gameplay
          path: media/
          if-no-files-found: warn

      # Publish to a force-updated `ci-video` branch so captures can be pulled
      # and viewed directly (artifacts aren't fetchable via the API).
      - name: Publish to the ci-video branch
        if: always()
        continue-on-error: true   # the artifact is the source of truth; the mirror is a convenience
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd media 2>/dev/null || { echo "no media dir — nothing to publish"; exit 0; }
          [ -n "$(ls -A . 2>/dev/null)" ] || { echo "nothing to publish"; exit 0; }
          git init -q
          git checkout -q -b ci-video
          git add .
          git -c user.email=actions@github.com -c user.name=ci \
            commit -q -m "tvOS gameplay for ${GITHUB_SHA:0:7} on ${GITHUB_REF_NAME}"
          # The push event and the pull_request event run this in parallel and both
          # force-push ci-video, so the ref can move under us — retry a few times.
          url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for i in 1 2 3 4 5; do
            git push -f "$url" ci-video && { echo "published"; exit 0; }
            echo "ci-video push raced (attempt $i), retrying…"; sleep $((RANDOM % 4 + 2))
          done
          echo "ci-video mirror lost the race; the artifact still has the frames"

  iphone-screenshots:
    name: iPhone Simulator screenshots
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest/Contents/Developer"; fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: AmeliaTV
        run: xcodegen generate

      - name: Build AmeliaPad for the iOS Simulator
        working-directory: AmeliaTV
        run: |
          xcodebuild build \
            -project AmeliaTV.xcodeproj \
            -scheme AmeliaPad \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO

      - name: Capture a sequence as the demo walk plays
        working-directory: AmeliaTV
        run: |
          set -euo pipefail
          APP="build/dd/Build/Products/Debug-iphonesimulator/AmeliaPad.app"
          BUNDLE_ID=$(xcodebuild -project AmeliaTV.xcodeproj -scheme AmeliaPad -showBuildSettings 2>/dev/null \
            | awk -F' = ' '/ PRODUCT_BUNDLE_IDENTIFIER /{print $2; exit}')
          DEVICE_ID=$(xcrun simctl list devices available | grep -i 'iPhone' \
            | grep -oiE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1)
          echo "Simulator: $DEVICE_ID  Bundle: $BUNDLE_ID"

          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b
          xcrun simctl install "$DEVICE_ID" "$APP"
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID"

          mkdir -p ../screenshots
          prev=0
          for t in 4 9 14 19 24 29; do
            sleep $((t - prev)); prev=$t
            out="../screenshots/seq_$(printf %02d $t)s.png"
            xcrun simctl io "$DEVICE_ID" screenshot "$out"
            # App is landscape in a portrait device frame; rotate upright.
            sips -r 270 "$out" >/dev/null || true
          done
          ls -la ../screenshots

      - name: Upload screenshots (artifact for humans)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: warn

      # Mirror to a force-updated `ci-screenshots` branch so the iPhone shots
      # (e.g. the touch-control overlay) can be pulled and reviewed directly.
      - name: Publish to the ci-screenshots branch
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd screenshots 2>/dev/null || { echo "no screenshots — nothing to publish"; exit 0; }
          [ -n "$(ls -A . 2>/dev/null)" ] || { echo "nothing to publish"; exit 0; }
          git init -q
          git checkout -q -b ci-screenshots
          git add .
          git -c user.email=actions@github.com -c user.name=ci \
            commit -q -m "iPhone screenshots for ${GITHUB_SHA:0:7} on ${GITHUB_REF_NAME}"
          url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for i in 1 2 3 4 5; do
            git push -f "$url" ci-screenshots && { echo "published"; exit 0; }
            echo "ci-screenshots push raced (attempt $i), retrying…"; sleep $((RANDOM % 4 + 2))
          done
          echo "ci-screenshots mirror lost the race; the artifact still has the shots"
