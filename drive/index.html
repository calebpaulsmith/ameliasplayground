<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3aa0ff">
<title>Amelia el Autobús 🚌</title>
<link rel="manifest" href="../manifest.webmanifest">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--blue:#3aa0ff;--ink:#16314a;--yellow:#ffd23f;--teal:#2ee6d6;--coral:#ff7e5f;
    --green:#57b85a;--white:#fbfdff;--red:#ff3b30;
    --font:"Fredoka","Baloo 2","Comic Sans MS","Trebuchet MS",sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;touch-action:none;font-family:var(--font);}
  html,body{height:100%;overflow:hidden;background:#9fd3ff;}
  #view{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0;}

  .overlay{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;}
  .overlay.show{display:flex;}

  /* ---- start screen ---- */
  #startScreen{background:radial-gradient(circle at 50% 25%,#bfe6ff,#7cc1ff 60%,#4aa0ef);color:var(--ink);}
  #startScreen.show{display:flex;}
  .bus-emoji{font-size:5.5rem;animation:hover 2s infinite ease-in-out;filter:drop-shadow(0 10px 16px rgba(0,0,0,.25));}
  @keyframes hover{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-14px) rotate(4deg)}}
  #startScreen h1{font-size:2.6rem;font-weight:700;margin:6px 0 2px;text-shadow:0 3px 0 rgba(255,255,255,.4);}
  #startScreen .sub{font-size:1.1rem;opacity:.85;margin-bottom:18px;font-weight:500;}
  .modebtn{width:min(86vw,360px);border:none;cursor:pointer;color:var(--white);font-weight:700;
    border-radius:26px;padding:16px 20px;margin:7px 0;display:flex;align-items:center;gap:14px;
    font-size:1.4rem;box-shadow:0 7px 0 rgba(0,0,0,.22),0 10px 20px rgba(0,0,0,.2);transition:transform .08s;}
  .modebtn:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.22);}
  .modebtn .em{font-size:2.2rem;}
  .modebtn .lbl{display:flex;flex-direction:column;align-items:flex-start;line-height:1.05;}
  .modebtn .lbl small{font-size:.8rem;font-weight:500;opacity:.92;}
  #btnStory{background:linear-gradient(180deg,#ffb14d,#e0792f);}
  #btnExplore{background:linear-gradient(180deg,var(--teal),#1f9d92);}
  .langtoggle{display:inline-flex;background:rgba(255,255,255,.5);border-radius:40px;padding:4px;gap:2px;margin-top:14px;}
  .langtoggle .lang{border:none;background:transparent;color:rgba(22,49,74,.6);font-weight:700;
    font-size:1rem;padding:7px 18px;border-radius:34px;cursor:pointer;}
  .langtoggle .lang.on{background:linear-gradient(180deg,var(--yellow),var(--coral));color:var(--ink);}
  .ghostbtn{margin-top:12px;background:rgba(255,255,255,.5);border:none;color:var(--ink);font-weight:600;
    font-size:1rem;padding:10px 20px;border-radius:30px;cursor:pointer;}
  #howtoBox{display:none;max-width:380px;margin-top:12px;background:rgba(255,255,255,.8);
    border-radius:20px;padding:14px 18px;font-size:1rem;line-height:1.35;color:var(--ink);}
  #howtoBox.show{display:block;}
  .homelink{position:fixed;top:max(12px,env(safe-area-inset-top));left:14px;z-index:31;
    background:rgba(255,255,255,.5);border-radius:30px;padding:8px 16px;color:var(--ink);
    text-decoration:none;font-weight:700;font-size:1rem;}

  /* ---- HUD ---- */
  #hud{position:fixed;inset:0;z-index:20;display:none;pointer-events:none;}
  #hud.show{display:block;}
  #hud .pointer{pointer-events:auto;}

  #topbar{position:absolute;top:max(10px,env(safe-area-inset-top));left:0;right:0;
    display:flex;align-items:flex-start;justify-content:space-between;padding:0 14px;gap:10px;}
  .iconbtn{pointer-events:auto;width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.85);color:var(--ink);font-size:1.4rem;box-shadow:0 4px 10px rgba(0,0,0,.2);}
  .iconbtn:active{transform:scale(.92);}
  .starpill{background:rgba(255,255,255,.85);border-radius:30px;padding:8px 16px;font-weight:700;
    color:var(--ink);font-size:1.2rem;display:flex;align-items:center;gap:6px;transition:transform .15s;}
  .starpill.pop{transform:scale(1.18);}

  /* GPS */
  #gpsPanel{position:absolute;top:max(72px,calc(env(safe-area-inset-top) + 62px));right:14px;
    width:150px;background:rgba(22,49,74,.82);border-radius:20px;padding:10px;color:#fff;
    display:none;flex-direction:column;align-items:center;gap:6px;box-shadow:0 6px 16px rgba(0,0,0,.3);}
  #gpsPanel.show{display:flex;}
  #minimap{width:130px;height:130px;border-radius:14px;background:#1b2233;}
  .gpsrow{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;}
  #gpsArrow{font-size:1.8rem;transition:transform .25s;line-height:1;}
  #gpsText{font-size:1rem;font-weight:700;text-align:center;line-height:1.05;}
  #gpsDist{font-size:.85rem;opacity:.8;}

  /* Speech bubble */
  #bubble{position:absolute;left:50%;top:max(14px,env(safe-area-inset-top));transform:translateX(-50%) translateY(-12px);
    max-width:min(80vw,520px);background:#fff;color:var(--ink);border-radius:22px;padding:12px 20px;
    font-size:1.15rem;font-weight:600;line-height:1.25;box-shadow:0 8px 22px rgba(0,0,0,.28);
    opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;text-align:center;}
  #bubble.show{opacity:1;transform:translateX(-50%) translateY(0);}
  #bubble::after{content:"🚌";position:absolute;left:18px;bottom:-26px;font-size:1.6rem;}

  /* Driving controls */
  #controls{position:absolute;left:0;right:0;bottom:max(18px,env(safe-area-inset-bottom));
    display:flex;justify-content:space-between;align-items:flex-end;padding:0 22px;}
  .ctrlgroup{display:flex;gap:14px;align-items:flex-end;}
  .drivebtn{pointer-events:auto;border:none;cursor:pointer;color:var(--white);font-weight:700;
    border-radius:50%;width:84px;height:84px;font-size:1.1rem;display:flex;flex-direction:column;
    align-items:center;justify-content:center;box-shadow:0 6px 0 rgba(0,0,0,.28),0 8px 16px rgba(0,0,0,.25);}
  .drivebtn:active{transform:translateY(5px);box-shadow:0 1px 0 rgba(0,0,0,.28);}
  .drivebtn .em{font-size:2rem;line-height:1;}
  #cLeft,#cRight{background:linear-gradient(180deg,#8fb3ff,#5a7fe0);}
  #cGo{background:linear-gradient(180deg,#5fd06a,#2f9d3a);width:104px;height:104px;font-size:1.3rem;}
  #cStop{background:linear-gradient(180deg,#ff6b6b,#d62f2f);width:104px;height:104px;font-size:1.3rem;}
  #cHorn{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);background:linear-gradient(180deg,var(--yellow),var(--coral));
    width:66px;height:66px;font-size:.9rem;color:var(--ink);}

  /* Celebrate */
  #celebrate{background:radial-gradient(circle,rgba(58,160,255,.95),rgba(22,49,74,.96));color:#fff;z-index:40;}
  #celebrate .big{font-size:6rem;animation:hover 1.6s infinite;}
  #celebrate h2{font-size:2rem;margin-top:8px;}
  .confetti{position:absolute;top:-20px;width:13px;height:13px;border-radius:3px;z-index:60;
    animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

  #pauseScreen{background:rgba(22,49,74,.86);color:#fff;z-index:35;}
  #pauseScreen h2{font-size:2rem;margin-bottom:16px;}

  @media (max-width:520px){
    .drivebtn{width:74px;height:74px;} #cGo,#cStop{width:90px;height:90px;}
  }
</style>
</head>
<body>
<canvas id="view"></canvas>

<!-- Start screen -->
<div id="startScreen" class="overlay show">
  <a class="homelink" href="../">← <span data-t="back">Atrás</span></a>
  <div class="bus-emoji">🚌</div>
  <h1 data-t="title">Amelia el Autobús</h1>
  <div class="sub" data-t="subtitle">¡Un autobús azul que habla y aprende!</div>
  <button id="btnStory" class="modebtn"><span class="em">🗺️</span>
    <span class="lbl"><span data-t="story">Aventura</span><small data-t="storySub">Sigue el GPS</small></span></button>
  <button id="btnExplore" class="modebtn"><span class="em">🚙</span>
    <span class="lbl"><span data-t="explore">Explorar</span><small data-t="exploreSub">Maneja libre</small></span></button>
  <div class="langtoggle">
    <button class="lang" data-l="es">ES</button>
    <button class="lang" data-l="en">EN</button>
  </div>
  <button id="btnHowto" class="ghostbtn" data-t="howto">¿Cómo se juega?</button>
  <div id="howtoBox" data-t="howtoBody"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="topbar">
    <button id="btnPause" class="iconbtn">⏸️</button>
    <div class="starpill">⭐ <span id="starCount">0</span></div>
  </div>

  <div id="bubble"><span id="bubbleText"></span></div>

  <div id="gpsPanel">
    <canvas id="minimap" width="130" height="130"></canvas>
    <div class="gpsrow"><span id="gpsArrow">⬆️</span><span id="gpsText"></span></div>
    <div id="gpsDist"></div>
  </div>

  <div id="controls">
    <div class="ctrlgroup">
      <button id="cLeft" class="drivebtn"><span class="em">⬅️</span><span data-t="left">Izq.</span></button>
      <button id="cRight" class="drivebtn"><span class="em">➡️</span><span data-t="right">Der.</span></button>
    </div>
    <div class="ctrlgroup">
      <button id="cStop" class="drivebtn"><span class="em">✋</span><span data-t="stop">ALTO</span></button>
      <button id="cGo" class="drivebtn"><span class="em">🚀</span><span data-t="go">VAMOS</span></button>
    </div>
  </div>
  <button id="cHorn" class="drivebtn">📣<br><span data-t="horn">Bocina</span></button>
</div>

<!-- Pause -->
<div id="pauseScreen" class="overlay">
  <h2 data-t="paused">En pausa</h2>
  <button id="btnResume" class="modebtn" style="background:linear-gradient(180deg,#5fd06a,#2f9d3a)">
    <span class="em">▶️</span><span class="lbl"><span data-t="resume">Seguir</span></span></button>
  <button id="btnQuit" class="modebtn" style="background:linear-gradient(180deg,#8fb3ff,#5a7fe0)">
    <span class="em">🏠</span><span class="lbl"><span data-t="quit">Salir</span></span></button>
</div>

<!-- Celebrate -->
<div id="celebrate" class="overlay">
  <div class="big">🏆</div>
  <h2 data-t="mComplete">¡Misión cumplida!</h2>
</div>

<script type="importmap">
{ "imports": { "three": "../vendor/three.module.min.js" } }
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
