# XcodeGen spec for the native tvOS app.
#
# We use XcodeGen (instead of committing a hand-maintained .xcodeproj) so the
# project definition is a small, diff-friendly YAML file — which fits the
# AI-authored / human-reviewed GitHub PR workflow (docs/tvos/TECHNICAL_ARCHITECTURE.md).
# CI runs `xcodegen generate` before building. Generate locally the same way:
#   brew install xcodegen && cd AmeliaTV && xcodegen generate && open AmeliaTV.xcodeproj
name: AmeliaTV
options:
  bundleIdPrefix: com.ameliasplayground
  deploymentTarget:
    tvOS: "26.0"
  createIntermediateGroups: true

packages:
  AmeliaCore:
    # The local Swift package in this same directory (Package.swift).
    path: .

targets:
  AmeliaTV:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Resources/tvOS/Assets.xcassets   # app icon + top-shelf (tvOS only)
      - path: Content
        type: folder        # folder reference: whole tree copied into the bundle
        buildPhase: resources
    dependencies:
      - package: AmeliaCore
        product: AmeliaCore
    scheme:
      testTargets: []
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "3"        # tvOS
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        INFOPLIST_KEY_CFBundleDisplayName: "Amelia"
        INFOPLIST_KEY_GCSupportsControllerUserInteraction: "YES"
        # No custom encryption (local TTS / no network) — skips the per-build
        # export-compliance prompt in TestFlight.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # No signing for normal CI; the protected release workflow handles it.
        CODE_SIGNING_ALLOWED: "NO"

  # iPad/iOS build of the same game. Shares App/ + Content/ + AmeliaCore; the only
  # platform-specific code is guarded with #if os(tvOS)/canImport. tvOS is the
  # flagship; this target exists so the game can be play-tested on the iOS
  # Simulator and iPad (RealityView requires iOS 18). Touch input drives the
  # left/right choice; the rest of the slice auto-drives.
  AmeliaPad:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Resources/iOS/Assets.xcassets    # app icon (iOS/iPad only)
      - path: Content
        type: folder        # folder reference: whole tree copied into the bundle
        buildPhase: resources
    dependencies:
      - package: AmeliaCore
        product: AmeliaCore
    scheme:
      testTargets: []
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"      # iPhone + iPad
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Amelia"
        INFOPLIST_KEY_GCSupportsControllerUserInteraction: "YES"
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~iphone": "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGNING_ALLOWED: "NO"
