# XcodeGen spec for the native tvOS app.
#
# We use XcodeGen (instead of committing a hand-maintained .xcodeproj) so the
# project definition is a small, diff-friendly YAML file — which fits the
# AI-authored / human-reviewed GitHub PR workflow (docs/tvos/TECHNICAL_ARCHITECTURE.md).
# CI runs `xcodegen generate` before building. Generate locally the same way:
#   brew install xcodegen && cd AmeliaTV && xcodegen generate && open AmeliaTV.xcodeproj
name: AmeliaTV
options:
  bundleIdPrefix: com.ameliasplayground
  deploymentTarget:
    tvOS: "26.0"
  createIntermediateGroups: true

packages:
  AmeliaCore:
    # The local Swift package in this same directory (Package.swift).
    path: .

targets:
  AmeliaTV:
    type: application
    platform: tvOS
    deploymentTarget: "26.0"
    sources:
      - path: App
      - path: Resources/tvOS/Assets.xcassets   # app icon + top-shelf (tvOS only)
      - path: Assets                            # runtime art (USDZ by id); docs excluded
        buildPhase: resources
        excludes:
          - "**/*.md"
      - path: Content
        type: folder        # folder reference: whole tree copied into the bundle
        buildPhase: resources
    dependencies:
      - package: AmeliaCore
        product: AmeliaCore
    scheme:
      testTargets: []
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "3"        # tvOS
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        INFOPLIST_KEY_CFBundleDisplayName: "Amelia"
        INFOPLIST_KEY_GCSupportsControllerUserInteraction: "YES"
        # No custom encryption (local TTS / no network) — skips the per-build
        # export-compliance prompt in TestFlight.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        # No signing for normal CI; the protected release workflow handles it.
        CODE_SIGNING_ALLOWED: "NO"

  # iPhone + iPad build of the same game (a flagship platform alongside tvOS).
  # Shares App/ + Content/ + AmeliaCore; the only platform-specific code is guarded
  # with #if os(tvOS)/canImport (RealityView requires iOS 18). The 10-foot UI is
  # laid out on a fixed canvas and scaled to fit the hand-held screen via
  # `adaptiveTVCanvas()` so nothing crowds on iPhone. Touch input drives the
  # left/right choice; the rest of the slice auto-drives. Runs on iPhone, iPad,
  # and the iOS Simulator.
  AmeliaPad:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
      - path: Resources/iOS/Assets.xcassets    # app icon (iOS/iPad only)
      - path: Assets                            # runtime art (USDZ by id); docs excluded
        buildPhase: resources
        excludes:
          - "**/*.md"
      - path: Content
        type: folder        # folder reference: whole tree copied into the bundle
        buildPhase: resources
    dependencies:
      - package: AmeliaCore
        product: AmeliaCore
    scheme:
      testTargets: []
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"      # iPhone + iPad
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "0.1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_CFBundleDisplayName: "Amelia"
        INFOPLIST_KEY_GCSupportsControllerUserInteraction: "YES"
        INFOPLIST_KEY_UIRequiresFullScreen: "YES"
        # Landscape-only. The generic (no ~iphone/~ipad suffix) key is the form the
        # Info.plist generator reliably honours; the suffixed variants were being
        # ignored, so the phone fell back to allowing portrait.
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        CODE_SIGNING_ALLOWED: "NO"
