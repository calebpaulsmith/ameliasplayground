<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Amelia 🚀">
<meta name="theme-color" content="#1a1147">
<meta name="description" content="Juegos espaciales para aprender y jugar — Amelia's Space Adventure.">
<title>Aventura Espacial de Amelia 🚀</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg1:#1a1147;--bg2:#3a1f6e;--bg3:#0d0826;--pink:#ff5da2;--yellow:#ffd23f;
    --teal:#2ee6d6;--coral:#ff7e5f;--lime:#a8e063;--purple:#a06bff;--ink:#1a1147;--white:#fff8f0;
    --font:"Fredoka","Baloo 2","Comic Sans MS","Trebuchet MS","Chalkboard SE",sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;touch-action:manipulation;}
  html,body{height:100%;overflow:hidden;font-family:var(--font);}
  body{background:radial-gradient(circle at 50% 20%,var(--bg2),var(--bg1) 55%,var(--bg3));
    color:var(--white);position:fixed;inset:0;display:flex;flex-direction:column;}
  #stars{position:absolute;inset:0;z-index:0;pointer-events:none;}
  .twinkle{position:absolute;border-radius:50%;background:#fff;animation:tw 2.5s infinite ease-in-out;}
  @keyframes tw{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
  .langtoggle{display:inline-flex;background:rgba(0,0,0,.3);border-radius:40px;padding:4px;gap:2px;}
  .langtoggle button{border:none;background:transparent;color:rgba(255,255,255,.6);font-family:var(--font);
    font-weight:700;font-size:1rem;padding:7px 16px;border-radius:34px;cursor:pointer;}
  .langtoggle button.on{background:linear-gradient(180deg,var(--yellow),var(--coral));color:var(--ink);}
  #start{position:absolute;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:16px;text-align:center;padding:24px;}
  #start h1{font-size:2.4rem;font-weight:700;line-height:1.1;text-shadow:0 4px 0 rgba(0,0,0,.25);}
  #start .sub{font-size:1.15rem;opacity:.85;font-weight:500;}
  .bigrocket{font-size:5.5rem;animation:hover 2s infinite ease-in-out;filter:drop-shadow(0 10px 20px rgba(0,0,0,.4));}
  @keyframes hover{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-18px) rotate(6deg)}}
  .playbtn{margin-top:6px;background:linear-gradient(180deg,var(--yellow),var(--coral));color:var(--ink);
    border:none;font-family:var(--font);font-weight:700;font-size:1.6rem;padding:18px 46px;border-radius:50px;
    box-shadow:0 8px 0 #c2410c,0 12px 24px rgba(0,0,0,.4);cursor:pointer;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .playbtn:active{transform:translateY(6px);box-shadow:0 2px 0 #c2410c;}
  #top{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;gap:8px;}
  #lefttop{display:flex;align-items:center;gap:8px;}
  .pill{background:rgba(0,0,0,.25);border-radius:40px;padding:7px 14px;font-size:1.25rem;font-weight:700;
    display:flex;align-items:center;gap:6px;}
  .pillbtn{border:none;color:var(--white);font-family:var(--font);cursor:pointer;}
  .pillbtn:active{transform:scale(.93);}
  /* PRIZE SHELF */
  #shelf{position:absolute;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;
    padding:18px 16px;background:radial-gradient(circle at 50% 15%,#46277e,#1a1147 60%,#0d0826);}
  #shelf.show{display:flex;}
  #shelf h2{font-size:1.9rem;font-weight:700;margin-bottom:4px;text-align:center;}
  #shelf .hint{font-size:1rem;opacity:.8;margin-bottom:14px;text-align:center;}
  #shelfGrid{flex:1;width:100%;max-width:520px;overflow-y:auto;display:grid;
    grid-template-columns:repeat(3,1fr);gap:14px;align-content:start;padding:4px;}
  .slot{aspect-ratio:1;border-radius:24px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;font-size:3.2rem;background:rgba(255,255,255,.07);
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.08);}
  .slot.got{background:linear-gradient(160deg,rgba(255,210,63,.25),rgba(255,93,162,.18));
    box-shadow:inset 0 0 0 3px rgba(255,210,63,.5),0 6px 16px rgba(0,0,0,.3);}
  .slot.locked{filter:grayscale(1);opacity:.4;font-size:2.4rem;}
  .slot.vehicle.got{cursor:pointer;}
  .slot.vehicle.got:active{transform:scale(.92);}
  .slot .uselbl{font-size:.7rem;font-weight:700;margin-top:4px;color:var(--yellow);text-transform:uppercase;letter-spacing:.5px;}
  .slot.current{box-shadow:inset 0 0 0 3px var(--teal),0 0 20px rgba(46,230,214,.5);}
  #shelfClose{margin-top:14px;}
  #lvl{font-size:.85rem;opacity:.85;margin-left:4px;}
  .topbtn{background:rgba(255,255,255,.15);border:none;color:var(--white);font-size:1.3rem;width:46px;
    height:46px;border-radius:50%;cursor:pointer;flex:none;}
  .topbtn:active{transform:scale(.9);}
  #topright{display:flex;align-items:center;gap:8px;}
  #top .langtoggle button{font-size:.8rem;padding:6px 11px;}
  #game{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:space-between;padding:0 14px 20px;min-height:0;}
  #mascot{font-size:3.6rem;cursor:pointer;animation:hover 2.4s infinite ease-in-out;
    filter:drop-shadow(0 8px 12px rgba(0,0,0,.4));flex:none;}
  #mascot:active{transform:scale(.85);}
  #prompt{font-size:1.6rem;font-weight:700;text-align:center;background:rgba(0,0,0,.2);padding:11px 20px;
    border-radius:30px;line-height:1.2;flex:none;}
  #board{flex:1;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:16px;width:100%;
    min-height:0;padding:6px 0;}
  .obj{font-size:3rem;animation:floaty 3s infinite ease-in-out;filter:drop-shadow(0 6px 8px rgba(0,0,0,.35));}
  .obj.sm{font-size:2.1rem;}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .tile{border:none;cursor:pointer;font-family:var(--font);font-weight:700;border-radius:26px;display:flex;
    flex-direction:column;align-items:center;justify-content:center;color:var(--ink);
    box-shadow:0 8px 0 rgba(0,0,0,.3),0 10px 20px rgba(0,0,0,.3);transition:transform .08s;}
  .tile:active{transform:translateY(6px);box-shadow:0 2px 0 rgba(0,0,0,.3);}
  .tile.big{width:30vw;max-width:140px;height:30vw;max-height:140px;font-size:4rem;}
  .tile.num{font-size:3.4rem;}
  .tile .dots{font-size:.95rem;letter-spacing:2px;margin-top:2px;color:rgba(0,0,0,.55);}
  .tile.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}
    40%{transform:translateX(10px)}60%{transform:translateX(-8px)}80%{transform:translateX(8px)}}
  .planet{border-radius:50%;}
  .groupbox{background:rgba(255,255,255,.12);border-radius:24px;padding:14px;display:flex;flex-wrap:wrap;gap:6px;
    align-items:center;justify-content:center;cursor:pointer;width:38vw;max-width:170px;min-height:120px;
    box-shadow:0 8px 0 rgba(0,0,0,.25);}
  .groupbox:active{transform:translateY(5px);}
  .groupbox .obj{font-size:2rem;animation:none;}
  .qmark{font-size:3rem;font-weight:700;opacity:.7;}
  #celebrate{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;background:radial-gradient(circle,rgba(58,31,110,.95),rgba(13,8,38,.97));}
  #celebrate.show{display:flex;}
  #celebEmoji{font-size:7rem;animation:launch 1.8s ease-in forwards;}
  @keyframes launch{0%{transform:translateY(40px) scale(1)}35%{transform:translateY(0) scale(1.15)}
    100%{transform:translateY(-120vh) scale(.6);opacity:.25}}
  #celebrate h2{font-size:2rem;font-weight:700;text-align:center;line-height:1.25;}
  .confetti{position:absolute;top:-20px;width:14px;height:14px;z-index:60;border-radius:3px;
    animation:fall linear forwards;pointer-events:none;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
  .floatup{position:absolute;z-index:70;font-weight:700;pointer-events:none;animation:fu 1s ease-out forwards;
    text-shadow:0 2px 4px rgba(0,0,0,.5);}
  @keyframes fu{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-46px)}}
  @media(min-height:700px){#prompt{font-size:1.9rem;} .obj{font-size:3.4rem;} #mascot{font-size:4.4rem;}}
  /* MENU */
  .menu{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px;}
  .menubtn{width:100%;font-size:1.4rem;display:flex;align-items:center;justify-content:center;gap:8px;}
  .menubtn.catch{background:linear-gradient(180deg,var(--teal),#1f9d92);box-shadow:0 8px 0 #11756c,0 12px 24px rgba(0,0,0,.4);}
  .menubtn.catch:active{box-shadow:0 2px 0 #11756c;}
  /* CATCH GAME */
  #catch{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;}
  #catch.show{display:flex;}
  #catchHUD{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;gap:8px;}
  #catchCanvas{position:absolute;inset:0;z-index:1;width:100%;height:100%;touch-action:none;}
  #catchHint{position:absolute;left:0;right:0;bottom:24px;z-index:4;text-align:center;font-weight:700;
    font-size:1.1rem;opacity:.9;pointer-events:none;transition:opacity .5s;text-shadow:0 2px 6px rgba(0,0,0,.6);}
  #catchHint.hide{opacity:0;}
  .menubtn.tower{background:linear-gradient(180deg,#ffb14d,#e0792f);box-shadow:0 8px 0 #b35a18,0 12px 24px rgba(0,0,0,.4);}
  .menubtn.tower:active{box-shadow:0 2px 0 #b35a18;}
  /* TOWER GAME */
  #stack{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;}
  #stack.show{display:flex;}
  #stackHUD{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;gap:8px;}
  #stackCanvas{position:absolute;inset:0;z-index:1;width:100%;height:100%;touch-action:none;}
  .stacktip{position:absolute;left:0;right:0;top:46%;z-index:4;text-align:center;font-weight:700;
    font-size:1.2rem;opacity:.9;pointer-events:none;transition:opacity .5s;text-shadow:0 2px 6px rgba(0,0,0,.6);}
  .stacktip.hide{opacity:0;}
  #stackEnd{position:absolute;inset:0;z-index:8;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;background:radial-gradient(circle,rgba(58,31,110,.92),rgba(13,8,38,.96));}
  #stackEnd.show{display:flex;}
  #stackEndTitle{font-size:2.2rem;font-weight:700;text-align:center;line-height:1.2;}
  #stackEndBest{font-size:1.2rem;opacity:.85;}
  /* STAR SONG (Simon) */
  .menubtn.song{background:linear-gradient(180deg,#c08bff,#8b4fe0);box-shadow:0 8px 0 #5e2fa6,0 12px 24px rgba(0,0,0,.4);}
  .menubtn.song:active{box-shadow:0 2px 0 #5e2fa6;}
  #song{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;}
  #song.show{display:flex;}
  #songHUD{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;gap:8px;}
  #songStage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:0;padding:0 14px 24px;}
  #songStatus{font-size:1.5rem;font-weight:700;text-align:center;background:rgba(0,0,0,.2);padding:10px 20px;border-radius:30px;line-height:1.2;min-height:1.2em;}
  #songSinger{font-size:3rem;animation:hover 2.4s infinite ease-in-out;filter:drop-shadow(0 8px 12px rgba(0,0,0,.4));}
  #pads{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:380px;}
  .pad{aspect-ratio:1;border:none;border-radius:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:3.4rem;color:rgba(255,255,255,.92);box-shadow:0 8px 0 rgba(0,0,0,.3),0 10px 22px rgba(0,0,0,.35);
    transition:transform .08s,filter .12s,box-shadow .12s;filter:brightness(.72) saturate(.9);
    text-shadow:0 3px 6px rgba(0,0,0,.4);}
  .pad.lit{filter:brightness(1.55) saturate(1.2);transform:translateY(-4px) scale(1.05);
    box-shadow:0 12px 0 rgba(0,0,0,.3),0 0 36px 6px currentColor;}
  .pad:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(0,0,0,.3);}
  #pads.lock .pad{cursor:default;}
  @media(min-height:700px){#songStatus{font-size:1.8rem;} #songSinger{font-size:3.8rem;} .pad{font-size:4rem;}}
  /* PLANET MERGE (2048) */
  .menubtn.merge{background:linear-gradient(180deg,#5fd0ff,#1f7fd0);box-shadow:0 8px 0 #14598f,0 12px 24px rgba(0,0,0,.4);}
  .menubtn.merge:active{box-shadow:0 2px 0 #14598f;}
  #merge{position:absolute;inset:0;z-index:30;display:none;flex-direction:column;}
  #merge.show{display:flex;}
  #mergeHUD{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:12px 14px;gap:6px;}
  #mergeWrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:0 12px 16px;min-height:0;}
  #mergeScores{display:flex;gap:10px;}
  #mergeBoard{position:relative;width:min(92vw,56vh,440px);aspect-ratio:1;background:rgba(0,0,0,.3);
    border-radius:22px;box-shadow:inset 0 0 0 3px rgba(255,255,255,.06);touch-action:none;flex:none;}
  .mcell{position:absolute;border-radius:14px;background:rgba(255,255,255,.05);}
  .mtile{position:absolute;display:flex;align-items:center;justify-content:center;border-radius:14px;
    will-change:transform;transition:transform .13s ease;box-shadow:0 5px 12px rgba(0,0,0,.35);overflow:hidden;}
  .mtile .em{line-height:1;display:block;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));}
  #mergeBoard.notrans .mtile{transition:none;}
  .mtile.pop .em{animation:mpop .2s ease;}
  .mtile.born .em{animation:mborn .18s ease;}
  @keyframes mpop{0%{transform:scale(1)}45%{transform:scale(1.26)}100%{transform:scale(1)}}
  @keyframes mborn{0%{transform:scale(.1);opacity:0}100%{transform:scale(1);opacity:1}}
  #mergeEnd{position:absolute;inset:0;z-index:8;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;background:radial-gradient(circle,rgba(58,31,110,.93),rgba(13,8,38,.97));}
  #mergeEnd.show{display:flex;}
  #mergeEndTitle{font-size:2rem;font-weight:700;text-align:center;line-height:1.2;}
  #mergeEndSub{font-size:1.2rem;opacity:.85;text-align:center;}
  /* AMELIA THE BUS (3D driving adventure — lives in /drive/) */
  .menubtn.bus{background:linear-gradient(180deg,#5fb0ff,#2f7fd0);box-shadow:0 8px 0 #1f5fa0,0 12px 24px rgba(0,0,0,.4);}
  .menubtn.bus:active{box-shadow:0 2px 0 #1f5fa0;}
  /* WIND GARDEN (calming generative chime game) */
  .menubtn.garden{background:linear-gradient(180deg,#7ad7c8,#33899a);box-shadow:0 8px 0 #20636f,0 12px 24px rgba(0,0,0,.4);}
  .menubtn.garden:active{box-shadow:0 2px 0 #20636f;}
  #garden{position:absolute;inset:0;z-index:30;display:none;
    background:linear-gradient(180deg,#1b1640 0%,#34245f 45%,#5a3168 72%,#7d4063 100%);}
  #garden.show{display:block;}
  #gardenCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;z-index:1;}
  #gardenHUD{position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:12px 14px;gap:8px;pointer-events:none;}
  #gardenHUD .topbtn,#gardenHUD .pill,#gardenHUD .pillbtn{pointer-events:auto;}
  #gardenHUD .pill{background:rgba(0,0,0,.22);}
  #gardenHint{position:absolute;left:0;right:0;bottom:32px;z-index:4;text-align:center;font-weight:600;font-size:1.05rem;
    opacity:.85;pointer-events:none;transition:opacity 1.3s;text-shadow:0 2px 10px rgba(0,0,0,.8);padding:0 18px;}
  #gardenHint.hide{opacity:0;}
  /* the start menu now holds six games — let it scroll gracefully on short screens */
  #start{justify-content:safe center;overflow-y:auto;}
  /* TV / game-controller mode: spatial focus ring + overscan-safe padding */
  .usepad .kbfocus{outline:4px solid #ffd23f!important;outline-offset:3px;}
  #cxToast{position:fixed;left:50%;bottom:6%;transform:translateX(-50%);z-index:95;background:rgba(0,0,0,.58);
    color:var(--white);font-family:var(--font);font-weight:600;font-size:1.05rem;padding:10px 20px;border-radius:30px;
    opacity:0;transition:opacity .4s;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.6);max-width:90vw;text-align:center;}
  #cxToast.show{opacity:1;}
  body.tv #top,body.tv #catchHUD,body.tv #stackHUD,body.tv #mergeHUD,body.tv #gardenHUD,body.tv #songHUD{
    padding-left:max(14px,3.6vw);padding-right:max(14px,3.6vw);padding-top:max(12px,3vh);}
  body.tv #start{padding:max(24px,4.5vh) max(24px,4.5vw);}
  body.tv #shelf{padding-top:max(18px,4vh);}
  body.tv #gardenHint,body.tv #catchHint{bottom:max(32px,7vh);}
</style>
</head>
<body>
<div id="stars"></div>

<div id="start">
  <div class="bigrocket">🚀</div>
  <h1 id="s_title">Aventura Espacial<br>de Amelia</h1>
  <div class="sub" id="s_sub">¡Elige un juego!</div>
  <div class="menu">
    <button class="playbtn menubtn bus" id="busBtn">🚌 <span id="b_bus">Amelia el Autobús</span></button>
    <button class="playbtn menubtn" id="playBtn">🧠 <span id="b_learn">Aprender</span></button>
    <button class="playbtn menubtn catch" id="catchBtn">⭐ <span id="b_catch">Atrapar estrellas</span></button>
    <button class="playbtn menubtn tower" id="towerBtn">🏗️ <span id="b_tower">Torre de cohetes</span></button>
    <button class="playbtn menubtn song" id="songBtn">🎶 <span id="b_song">Canción de estrellas</span></button>
    <button class="playbtn menubtn merge" id="mergeBtn">🪐 <span id="b_merge">Fusión de planetas</span></button>
    <button class="playbtn menubtn garden" id="gardenBtn">🎐 <span id="b_garden">Jardín de viento</span></button>
  </div>
  <div class="langtoggle" id="langStart"><button data-l="es">Español</button><button data-l="en">English</button></div>
</div>

<div id="top" style="visibility:hidden">
  <div id="lefttop">
    <div class="pill">⭐ <span id="starCount">0</span><span id="lvl">⚡1</span></div>
    <button class="pill pillbtn" id="shelfBtn">🎒 <span id="prizeCount">0</span></button>
  </div>
  <div id="topright">
    <div class="langtoggle" id="langTop"><button data-l="es">ES</button><button data-l="en">EN</button></div>
    <button class="topbtn" id="repeatBtn">🔊</button>
    <button class="topbtn" id="homeBtn">🏠</button>
  </div>
</div>

<div id="game" style="visibility:hidden">
  <div id="mascot">🚀</div>
  <div id="prompt">¡Vamos!</div>
  <div id="board"></div>
</div>

<div id="stack">
  <div id="stackHUD">
    <button class="topbtn" id="stackBack">🏠</button>
    <div class="pill">🏗️ <span id="stackFloors">0</span></div>
    <div class="pill">⭐ <span id="stackStars">0</span></div>
    <button class="pill pillbtn" id="stackShelf">🎒 <span id="stackPrize">0</span></button>
  </div>
  <canvas id="stackCanvas"></canvas>
  <div id="stackTip" class="stacktip">Toca para soltar 👆</div>
  <div id="stackEnd">
    <div id="stackEndTitle">🏆</div>
    <div id="stackEndBest"></div>
    <button class="playbtn" id="stackAgain">¡Otra vez! 🔁</button>
  </div>
</div>

<div id="catch">
  <div id="catchHUD">
    <button class="topbtn" id="catchBack">🏠</button>
    <div class="pill">⭐ <span id="catchStars">0</span></div>
    <button class="pill pillbtn" id="catchShelf">🎒 <span id="catchPrize">0</span></button>
  </div>
  <canvas id="catchCanvas"></canvas>
  <div id="catchHint">👆 ¡Mueve el dedo para atrapar!</div>
</div>

<div id="song">
  <div id="songHUD">

/* ===== AUDIO ===== */
let AC=null;
function initAudio(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } }
function tone(f,d,t,dl,v){ if(!AC)return; const s=AC.currentTime+(dl||0);
  const o=AC.createOscillator(),g=AC.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,s);
  g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v||0.25,s+0.02);
  g.gain.exponentialRampToValueAtTime(0.001,s+d);o.connect(g);g.connect(AC.destination);o.start(s);o.stop(s+d+0.05);}
function happySound(){[523,659,784,1047].forEach((f,i)=>tone(f,0.25,'triangle',i*0.09,0.3));}
function tapSound(){tone(660,0.12,'sine',0,0.2);}
function nopeSound(){tone(200,0.18,'sawtooth',0,0.18);tone(160,0.2,'sawtooth',0.12,0.16);}
function blastSound(){for(let i=0;i<12;i++)tone(120+i*70,0.4,'sawtooth',i*0.05,0.12);}

let allVoices=[];
function loadVoices(){ if('speechSynthesis' in window) allVoices=speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function scoreVoice(v,lang){
  const L=(v.lang||'').toLowerCase(), N=(v.name||'').toLowerCase(); let s=0;
  if(lang==='es'){
    const latam=['es-mx','es-us','es-419','es-co','es-ar','es-cl','es-pe','es-ve','es-la'];
    if(latam.includes(L))s+=6; else if(L.startsWith('es')&&L!=='es-es')s+=4; else if(L==='es-es')s+=1; else s-=6;
    if(/paulina|francisca|google|catalina|female|mujer|monica/.test(N))s+=2;
    if(/juan|jorge|carlos|diego|male|hombre/.test(N))s-=1;
  }else{
    if(L.startsWith('en-us'))s+=6; else if(L.startsWith('en'))s+=4; else s-=6;
    if(/samantha|google|karen|zira|allison|ava|female|nicky/.test(N))s+=2;
    if(/male|fred|daniel|alex/.test(N))s-=1;
  }
  return s;
}
function voiceFor(lang){ if(!allVoices.length)return null; let b=null,bs=-99;
  allVoices.forEach(v=>{const s=scoreVoice(v,lang); if(s>bs){bs=s;b=v;}}); return b; }
function say(text){ if(!('speechSynthesis' in window))return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
    const v=voiceFor(LANG); if(v)u.voice=v;
    u.lang=LANG==='es'?'es-MX':'en-US';
    u.rate=0.95; u.pitch=1.28; u.volume=1;   /* higher pitch = brighter, happier */
    speechSynthesis.speak(u);
  }catch(e){} }

function rBigger(){const askBig=Math.random()<0.5,c=rand(COLORS);

/* 10. PEEKABOO MEMORY — watch where the alien hides, then tap it */
function rPeek(){
  const k = level>=3 ? 4 : 3;
  const revealMs = level>=3 ? 1200 : 1600;
  const hideIdx = Math.floor(Math.random()*k);
  current={custom:true,
    text:{es:'¿Dónde está? 👽',en:'Where is it? 👽'},
    voice:{es:'¿Dónde se escondió el extraterrestre?',en:'Where did the alien hide?'}};
  const doors=[];
  for(let i=0;i<k;i++){
    const b=document.createElement('button'); b.className='tile big';
    b.style.background=COLORS[i%COLORS.length].css; b.textContent='🚀';
    b.onclick=()=>{ if(revealing)return; answer(i===hideIdx,b); };
    board.appendChild(b); doors.push(b);
  }
  // reveal phase: show prompt "watch!", peek the alien, then hide and ask
  revealing=true;
  prompt.innerHTML = LANG==='es' ? '¡Mira bien! 👀' : 'Watch closely! 👀';
  say(LANG==='es' ? '¡Mira bien dónde se esconde!' : 'Watch closely where it hides!');
  doors[hideIdx].textContent='👽';
  doors[hideIdx].style.transform='scale(1.12)';
  setTimeout(()=>{
    doors[hideIdx].textContent='🚀';
    doors[hideIdx].style.transform='';
    revealing=false;
    if(current && current.custom) showPrompt(); // now ask "where is it?"
  }, revealMs);
}

function floatText(txt,color,x,y){const f=document.createElement('div');f.className='floatup';f.textContent=txt;
  f.style.left=x+'px';f.style.top=y+'px';f.style.color=color;f.style.fontSize='1.5rem';document.body.appendChild(f);setTimeout(()=>f.remove(),1000);}

/* ===== ANSWER (adaptive, never lose) ===== */
function answer(correct,el){
  if(locked)return;
  if(correct){
    locked=true; tapSound(); happySound();
    mascot.style.animation='none';void mascot.offsetWidth;mascot.style.transform='scale(1.4)';
    setTimeout(()=>{mascot.style.transform='';mascot.style.animation='';},400);
    burstConfetti(); say(rand(PRAISE[LANG]));
    // level up on streak
    streak++; let leveled=false;
    if(level<MAXLEVEL && streak>=STREAK_UP){ level++; streak=0; leveled=true; $('lvl').textContent='⚡'+level; }
    // stars scale with level
    const award=level; stars+=award; saveProgress(); refreshCounters();
    floatText('+'+award+'⭐','#ffd23f',24,58);
    if(leveled) setTimeout(()=>{ say(UI.harder[LANG]); floatText(LANG==='es'?'¡Más difícil! 💪':'Harder! 💪','#2ee6d6',innerWidth/2-70,140); },650);
    // prize every 5 stars
    if(stars>=nextPrizeStars()){ setTimeout(()=>givePrize(), leveled?1200:700); }
    else setTimeout(()=>{locked=false;newRound();}, leveled?1700:1500);
  }else{
    nopeSound(); el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),450); say(rand(TRYAGAIN[LANG]));
    streak=0; if(level>1){ level--; $('lvl').textContent='⚡'+level; }  // ease back down
  }
}

/* ===== CATCH GAME ===== */
const catchView=$('catch'), cv=$('catchCanvas');
let ctx=null, cw=0, ch=0, dpr=1;
let rocketX=0, rocketY=0, items=[], particles=[];
let catchRunning=false, catchPaused=false, dizzyUntil=0, spawnAcc=0, lastT=0;
const GOOD=['⭐','🌟','🪐','🌙','🎈','🍭','💎','🍪'];
const BAD=['☄️','💥'];
const EMOJI_FONT='"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",serif';

function sizeCanvas(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  cw=catchView.clientWidth; ch=catchView.clientHeight;
  cv.width=Math.round(cw*dpr); cv.height=Math.round(ch*dpr);
  ctx=cv.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  rocketY=ch-72; if(!rocketX) rocketX=cw/2;
}
function updateCatchHUD(){ $('catchStars').textContent=stars; $('catchPrize').textContent=prizesWon; }

function startCatch(){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume();
  loadProgress();
  $('start').style.display='none';
  catchView.classList.add('show');
  sizeCanvas();
  items=[];particles=[];spawnAcc=0;dizzyUntil=0;rocketX=cw/2;catchPaused=false;catchRunning=true;lastT=0;
  Input.mode='play-catch'; setFocus(null);
  updateCatchHUD();
  $('catchHint').classList.remove('hide');
  setTimeout(()=>$('catchHint').classList.add('hide'),3500);
  say(UI.catchGo[LANG]);
  requestAnimationFrame(catchLoop);
}
function stopCatch(){ catchRunning=false; catchView.classList.remove('show'); }

function diff(){ const s=stars; return {speed:150+Math.min(s*4,280), rate:0.9+Math.min(s*0.02,1.4)}; }

function spawnItem(){
  const bad=Math.random()<Math.min(0.10+stars*0.003,0.26);
  const {speed}=diff();
  items.push({x:34+Math.random()*(cw-68),y:-30,vy:speed*(0.8+Math.random()*0.5),
    emoji:bad?rand(BAD):rand(GOOD),bad});
}
function catchLoop(t){
  if(!catchRunning)return;
  const now=t||performance.now(); const dt=Math.min((now-lastT)/1000||0,0.05); lastT=now;
  if(!catchPaused) step(dt);
  draw();
  requestAnimationFrame(catchLoop);
}
function step(dt){
  const {rate}=diff();
  if(Input.ax) rocketX=Math.max(34,Math.min(cw-34, rocketX+Input.ax*470*dt));
  spawnAcc+=dt*rate;
  while(spawnAcc>=0.6){ spawnAcc-=0.6; spawnItem(); }
  const dizzy=performance.now()<dizzyUntil;
  for(let i=items.length-1;i>=0;i--){
    const it=items[i]; it.y+=it.vy*dt;
    if(!dizzy && it.y>rocketY-36 && it.y<rocketY+30 && Math.abs(it.x-rocketX)<48){
      if(it.bad) onBomb(it); else onCatch(it);
      items.splice(i,1); continue;
    }
    if(it.y>ch+40) items.splice(i,1);
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=600*dt; p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
}
function onCatch(it){
  tapSound(); stars+=1; saveProgress(); refreshCounters(); burstAt(it.x,it.y);
  if(stars>=nextPrizeStars()){
    catchPaused=true; happySound();
    givePrize(()=>{ refreshCounters(); catchPaused=false; lastT=performance.now(); });
  }
}
function onBomb(it){ nopeSound(); dizzyUntil=performance.now()+900;
  for(let i=0;i<8;i++) particles.push({x:it.x,y:it.y,vx:(Math.random()-0.5)*300,vy:(Math.random()-0.5)*300,life:0.5,c:'#ff7e5f'}); }
function burstAt(x,y){ const cs=['#ffd23f','#2ee6d6','#ff5da2','#a8e063'];
  for(let i=0;i<7;i++) particles.push({x,y,vx:(Math.random()-0.5)*260,vy:-Math.random()*260,life:0.6,c:rand(cs)}); }
function draw(){
  if(!ctx)return; ctx.clearRect(0,0,cw,ch);
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.font='34px '+EMOJI_FONT;
  for(const it of items) ctx.fillText(it.emoji,it.x,it.y);
  for(const p of particles){ ctx.globalAlpha=Math.max(p.life/0.6,0); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,5,0,7); ctx.fill(); }
  ctx.globalAlpha=1;
  const dizzy=performance.now()<dizzyUntil;
  ctx.save(); ctx.translate(rocketX,rocketY);
  if(dizzy) ctx.rotate(Math.sin(performance.now()/55)*0.45);
  ctx.font='56px '+EMOJI_FONT; ctx.fillText(currentMascot,0,0);
  ctx.restore();
  if(dizzy){ ctx.font='26px '+EMOJI_FONT; ctx.fillText('💫',rocketX+20,rocketY-30); }
}
function movePointer(clientX){ const r=cv.getBoundingClientRect();
  rocketX=Math.max(34,Math.min(cw-34,clientX-r.left)); }
cv.addEventListener('pointermove',e=>movePointer(e.clientX));
cv.addEventListener('pointerdown',e=>movePointer(e.clientX));
cv.addEventListener('touchmove',e=>{ if(e.touches[0]){movePointer(e.touches[0].clientX); e.preventDefault();} },{passive:false});
cv.addEventListener('touchstart',e=>{ if(e.touches[0])movePointer(e.touches[0].clientX); },{passive:true});
window.addEventListener('resize',()=>{ if(catchRunning) sizeCanvas(); });

$('catchBtn').addEventListener('click',()=>{ tapSound(); startCatch(); });
$('catchBack').addEventListener('click',()=>{ tapSound(); goHome(); });
$('catchShelf').addEventListener('click',()=>{ tapSound(); openShelf(); });

/* ===== TOWER GAME (Torre de cohetes) ===== */
const stackView=$('stack'), scv=$('stackCanvas');
let sctx=null, scw=0, sch=0, sdpr=1;
let blocks=[], moving=null, sFloors=0, sCombo=0, sBest=0;
let stackRunning=false, stackOver=false, stackPaused=false, sLastT=0, camY=0, camTarget=0, sDebris=[];
const BLOCKH=32;
function blockColor(i){ return `hsl(${(i*24)%360} 72% 60%)`; }
function placeSound(f){ tone(360+Math.min(f*16,380),0.1,'square',0,0.18); }
function perfectPing(c){ const b=560+Math.min(c*70,420); [b,b*1.26].forEach((f,i)=>tone(f,0.18,'triangle',i*0.06,0.26)); }

function sizeStackCanvas(){
  sdpr=Math.min(window.devicePixelRatio||1,2);
  scw=stackView.clientWidth; sch=stackView.clientHeight;
  scv.width=Math.round(scw*sdpr); scv.height=Math.round(sch*sdpr);
  sctx=scv.getContext('2d'); sctx.setTransform(sdpr,0,0,sdpr,0,0);
}
const yFor=i=> sch-58 - i*BLOCKH + camY;
function updateCamTarget(){ camTarget=Math.max(0, sch*0.42 - (sch-58 - blocks.length*BLOCKH)); }

function spawnMoving(){
  const below=blocks[blocks.length-1];
  const speed=Math.min(130+sFloors*13, 430);
  const fromLeft=Math.random()<0.5;
  moving={x:fromLeft?0:scw-below.w, w:below.w, dir:fromLeft?1:-1, speed, color:blockColor(blocks.length)};
}
function beginRound(){
  blocks=[]; sFloors=0; sCombo=0; stackOver=false; stackPaused=false; camY=0; camTarget=0; sDebris=[];
  const baseW=Math.min(scw*0.52,210);
  blocks.push({x:(scw-baseW)/2, w:baseW, color:blockColor(0)});
  spawnMoving(); sLastT=performance.now();
}
function startStack(){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume();
  loadProgress(); mascot.textContent=currentMascot;
  $('start').style.display='none'; stackView.classList.add('show'); $('stackEnd').classList.remove('show');
  sizeStackCanvas(); beginRound(); stackRunning=true; refreshCounters();
  Input.mode='play-tower'; setFocus(null);
  $('stackFloors').textContent='0';
  $('stackTip').classList.remove('hide'); setTimeout(()=>$('stackTip').classList.add('hide'),2600);
  say(UI.towerGo[LANG]);
  requestAnimationFrame(stackLoop);
}
function stopStack(){ stackRunning=false; stackView.classList.remove('show'); $('stackEnd').classList.remove('show'); }

function stackLoop(t){
  if(!stackRunning)return;
  const now=t||performance.now(); const dt=Math.min((now-sLastT)/1000||0,0.05); sLastT=now;
  camY+=(camTarget-camY)*Math.min(1,dt*6);
  if(!stackOver && !stackPaused && moving){
    moving.x+=moving.dir*moving.speed*dt;
    if(moving.x<0){moving.x=0;moving.dir=1;}
    if(moving.x+moving.w>scw){moving.x=scw-moving.w;moving.dir=-1;}
  }
  for(let i=sDebris.length-1;i>=0;i--){const d=sDebris[i];d.x+=d.vx*dt;d.y+=d.vy*dt;d.vy+=900*dt;d.life-=dt;if(d.life<=0)sDebris.splice(i,1);}
  drawStack();
  requestAnimationFrame(stackLoop);
}
function drawStack(){
  if(!sctx)return; sctx.clearRect(0,0,scw,sch);
  for(let i=0;i<blocks.length;i++){ const b=blocks[i],y=yFor(i); if(y>sch+BLOCKH||y<-BLOCKH)continue;
    roundRect(b.x,y-BLOCKH+2,b.w,BLOCKH-3,7,b.color); }
  for(const d of sDebris) roundRect(d.x,d.y,d.w,BLOCKH-3,6,d.color,Math.max(d.life/0.7,0));
  if(!stackOver && moving){ roundRect(moving.x,yFor(blocks.length)-BLOCKH+2,moving.w,BLOCKH-3,7,moving.color); }
  // mascot riding the top block
  const top=blocks[blocks.length-1], ty=yFor(blocks.length-1);
  sctx.font='30px '+EMOJI_FONT; sctx.textAlign='center'; sctx.textBaseline='middle';
  sctx.fillText(currentMascot, top.x+top.w/2, ty-BLOCKH/2);
}
function roundRect(x,y,w,h,r,fill,alpha){
  sctx.globalAlpha=alpha==null?1:alpha;
  sctx.beginPath();
  sctx.moveTo(x+r,y); sctx.arcTo(x+w,y,x+w,y+h,r); sctx.arcTo(x+w,y+h,x,y+h,r);
  sctx.arcTo(x,y+h,x,y,r); sctx.arcTo(x,y,x+w,y,r); sctx.closePath();
  sctx.fillStyle=fill; sctx.fill();
  sctx.globalAlpha=1;
}
function dropBlock(){
  if(!stackRunning)return;
  if(stackOver){ startStack(); return; }     // tap to restart
  if(stackPaused||!moving)return;
  const below=blocks[blocks.length-1];
  const L=Math.max(moving.x,below.x), R=Math.min(moving.x+moving.w,below.x+below.w);
  const overlap=R-L;
  if(overlap<=2){ endStack(); return; }
  let nx=L, nw=overlap, perfect=false;
  if(Math.abs(moving.x-below.x)<10){ perfect=true; nx=below.x; nw=below.w; }
  // sliced overhang debris
  if(!perfect){
    if(moving.x<below.x){ sDebris.push({x:moving.x,y:yFor(blocks.length)-BLOCKH+2,w:below.x-moving.x,color:moving.color,vx:-60,vy:-40,life:0.7}); }
    const rOver=(moving.x+moving.w)-(below.x+below.w);
    if(rOver>0){ sDebris.push({x:below.x+below.w,y:yFor(blocks.length)-BLOCKH+2,w:rOver,color:moving.color,vx:60,vy:-40,life:0.7}); }
  }
  blocks.push({x:nx,w:nw,color:moving.color}); sFloors++; $('stackFloors').textContent=sFloors;
  let gain;
  if(perfect){ sCombo++; gain=2+(sCombo>=3?1:0); perfectPing(sCombo);
    floatText(UI.perfect[LANG]+(sCombo>=3?' x'+sCombo:''),'#ffd23f',innerWidth/2-50,sch*0.4); }
  else { sCombo=0; gain=1; placeSound(sFloors); }
  stars+=gain; saveProgress(); refreshCounters();
  if(stars>=nextPrizeStars()){
    stackPaused=true; happySound();
    givePrize(()=>{ refreshCounters(); stackPaused=false; sLastT=performance.now(); });
  }
  spawnMoving(); updateCamTarget();
}
function endStack(){
  stackOver=true; nopeSound(); tone(150,0.3,'sawtooth',0.05,0.16);
  sBest=Math.max(sBest,sFloors);
  $('stackEndTitle').innerHTML=(LANG==='es'?'🏆 ¡'+sFloors+' '+UI.floorsWord[LANG]+'!':'🏆 '+sFloors+' '+UI.floorsWord[LANG]+'!');
  $('stackEndBest').textContent=UI.best[LANG]+': '+sBest+' '+UI.floorsWord[LANG];
  $('stackEnd').classList.add('show');
  Input.mode='menu'; if(Input.active) setTimeout(focusFirst,0);
}
scv.addEventListener('pointerdown',()=>dropBlock());
window.addEventListener('resize',()=>{ if(stackRunning) sizeStackCanvas(); });
$('towerBtn').addEventListener('click',()=>{ tapSound(); startStack(); });
$('stackBack').addEventListener('click',()=>{ tapSound(); goHome(); });
$('stackShelf').addEventListener('click',()=>{ tapSound(); openShelf(); });
$('stackAgain').addEventListener('click',()=>{ tapSound(); startStack(); });

/* ===== STAR SONG (Simon memory) ===== */
const songView=$('song'), padsEl=$('pads'), songStatus=$('songStatus'), songSinger=$('songSinger');
/* four singing planets — each a color + a note in a happy pentatonic-ish scale */
const PADS=[
  {emoji:'🪐',color:'#ff5da2',freq:392},  // G4
  {emoji:'🌟',color:'#ffd23f',freq:523},  // C5
  {emoji:'🌙',color:'#2ee6d6',freq:659},  // E5
  {emoji:'☄️',color:'#a06bff',freq:784},  // G5
];
let songSeq=[], songStep=0, songRunning=false, songInput=false, songPadEls=[];
let songTimers=[];
function clearSongTimers(){ songTimers.forEach(clearTimeout); songTimers=[]; }
function later(fn,ms){ const id=setTimeout(fn,ms); songTimers.push(id); return id; }

function buildPads(){
  padsEl.innerHTML=''; songPadEls=[];
  PADS.forEach((p,i)=>{
    const b=document.createElement('button');
    b.className='pad'; b.textContent=p.emoji; b.dataset.idx=i;
    b.style.background=p.color; b.style.color=p.color;  // currentColor used for glow
    b.addEventListener('pointerdown',()=>onPadTap(i));
    padsEl.appendChild(b); songPadEls.push(b);
  });
}
function litPad(i,ms){
  const b=songPadEls[i]; if(!b)return;
  b.classList.add('lit'); tone(PADS[i].freq,(ms||320)/1000,'triangle',0,0.32);
  later(()=>b.classList.remove('lit'), Math.max(140,(ms||320)-60));
}
function playSequence(){
  songInput=false; padsEl.classList.add('lock');
  songStatus.textContent=UI.songListen[LANG];
  songSinger.style.animationDuration='0.6s';
  const gap=Math.max(360, 620-songSeq.length*18);  // speeds up gently as it grows
  songSeq.forEach((idx,n)=>{ later(()=>litPad(idx,Math.min(gap-120,420)), 600+n*gap); });
  later(()=>{
    songInput=true; songStep=0; padsEl.classList.remove('lock');
    songSinger.style.animationDuration='2.4s';
    songStatus.textContent=UI.songYourTurn[LANG];
  }, 600+songSeq.length*gap+120);
}
function nextNote(){ songSeq.push(Math.floor(Math.random()*PADS.length)); $('songRound').textContent=songSeq.length; }
function onPadTap(i){
  if(!songRunning||!songInput)return;
  litPad(i,300);
  if(i===songSeq[songStep]){
    songStep++;
    if(songStep>=songSeq.length){            // whole melody repeated correctly!
      songInput=false; padsEl.classList.add('lock');
      const gain=songSeq.length;             // longer song → more stars
      stars+=gain; saveProgress(); refreshCounters();
      happySound(); songStatus.textContent=UI.songNice[LANG];
      floatText('+'+gain+'⭐','#ffd23f',innerWidth/2-26,140);
      say(rand(PRAISE[LANG]));
      if(stars>=nextPrizeStars()){
        givePrize(()=>{ refreshCounters(); if(songRunning){ nextNote(); playSequence(); } });
      }else{
        later(()=>{ if(songRunning){ nextNote(); playSequence(); } }, 1100);
      }
    }
  }else{                                     // gentle miss — never lose, just hear it again
    songInput=false; padsEl.classList.add('lock');
    nopeSound(); songStatus.textContent=UI.songOops[LANG];
    say(UI.songOops[LANG]);
    later(()=>{ if(songRunning) playSequence(); }, 1300);
  }
}

/* ===== PLANET MERGE (2048-style) ===== */
const mergeView=$('merge'), mergeBoard=$('mergeBoard');
/* the cosmic growth chain: spark → ... → galaxy */
const CHAIN=['✨','☄️','🌙','🪐','🌍','🌕','⭐','🌟','🛸','🚀','🌞','🌌'];
const CHAIN_BG=[
  'linear-gradient(160deg,#7e6bd6,#4b3aa0)','linear-gradient(160deg,#9b8cff,#5a47c4)',
  'linear-gradient(160deg,#9aa7c7,#5b6789)','linear-gradient(160deg,#ffb14d,#d97a1f)',
  'linear-gradient(160deg,#4d9bff,#2360c4)','linear-gradient(160deg,#e9e2c4,#b9ac7d)',
  'linear-gradient(160deg,#ffe06b,#f4b41a)','linear-gradient(160deg,#ffd23f,#ff9e1f)',
  'linear-gradient(160deg,#2ee6d6,#16a99b)','linear-gradient(160deg,#ff7e8a,#e23d5a)',
  'linear-gradient(160deg,#ffcf4d,#ff7a18)','linear-gradient(160deg,#c77bff,#7a2fd6)'];
const TOP=CHAIN.length-1;
let mg=[], mgTiles=[], mgCells=[], mgId=0;
let mgScore=0, mgBest=0, mgRunning=false, mgLock=false, mgOver=false, mgWon=false;
let mP=0, mGap=0, mCell=0;
function emptyGrid(){ return [0,1,2,3].map(()=>[null,null,null,null]); }

function computeGeom(){ const W=mergeBoard.clientWidth||300;
  mP=Math.round(W*0.035); mGap=mP; mCell=(W-2*mP-3*mGap)/4; }
function ensureCells(){ if(mgCells.length)return;
  for(let i=0;i<16;i++){ const el=document.createElement('div'); el.className='mcell'; mergeBoard.appendChild(el); mgCells.push(el); } }
function posXY(r,c){ return [mP+c*(mCell+mGap), mP+r*(mCell+mGap)]; }
function setPos(t){ const [x,y]=posXY(t.r,t.c); t.el.style.transform=`translate(${x}px,${y}px)`; }
function sizeTile(t){ t.el.style.width=t.el.style.height=mCell+'px'; t.em.style.fontSize=(mCell*0.5)+'px'; }
function relayout(){ computeGeom();
  mergeBoard.classList.add('notrans');
  mgCells.forEach((el,i)=>{ const r=(i/4|0),c=i%4,[x,y]=posXY(r,c);
    el.style.width=el.style.height=mCell+'px'; el.style.transform=`translate(${x}px,${y}px)`; });
  for(const t of mgTiles){ sizeTile(t); setPos(t); }
  void mergeBoard.offsetWidth; mergeBoard.classList.remove('notrans'); }

function updateTileVisual(t){ t.em.textContent=CHAIN[t.lvl]; t.el.style.background=CHAIN_BG[t.lvl]; }
function makeTile(r,c,lvl,born){
  const el=document.createElement('div'); el.className='mtile'+(born?' born':'');
  const em=document.createElement('span'); em.className='em'; el.appendChild(em);
  mergeBoard.appendChild(el);
  const t={id:++mgId,lvl,r,c,el,em}; updateTileVisual(t); sizeTile(t); setPos(t);
  mgTiles.push(t); mg[r][c]=t;
  if(born) setTimeout(()=>el.classList.remove('born'),200);
  return t;
}
function clearTiles(){ mgTiles.forEach(t=>t.el.remove()); mgTiles=[]; mg=emptyGrid(); }
function spawnTile(){ const empt=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++) if(!mg[r][c]) empt.push([r,c]);
  if(!empt.length)return null; const [r,c]=empt[Math.floor(Math.random()*empt.length)];
  return makeTile(r,c, Math.random()<0.88?0:1, true); }
function updateMergeLabels(){ $('mergeScore').textContent=mgScore; $('mergeBest').textContent=mgBest; }

function saveMerge(){ try{ localStorage.setItem('amelia_merge',
  JSON.stringify({grid:mg.map(row=>row.map(t=>t?t.lvl:-1)),score:mgScore,best:mgBest})); }catch(e){} }
function loadMerge(){ let d=null; try{ d=JSON.parse(localStorage.getItem('amelia_merge')||'null'); }catch(e){}
  mgBest=(d&&d.best)||0;
  const hasGame=d&&d.grid&&d.grid.some(row=>row.some(v=>v>=0));
  clearTiles();
  if(hasGame){ mgScore=d.score||0; mgWon=false;
    for(let r=0;r<4;r++)for(let c=0;c<4;c++){ const v=d.grid[r][c]; if(v>=0){ makeTile(r,c,v,false); if(v>=TOP)mgWon=true; } } }
  else { newMergeGame(true); }
  updateMergeLabels();
}
function newMergeGame(skipSave){ clearTiles(); mgScore=0; mgWon=false; mgOver=false; mgLock=false;
  Input.mode='play-merge'; setFocus(null);
  $('mergeEnd').classList.remove('show');
  spawnTile(); spawnTile(); updateMergeLabels(); if(!skipSave)saveMerge(); }

function mergeLineCells(dir){ const lines=[];
  if(dir==='left'||dir==='right'){ for(let r=0;r<4;r++){ const ln=[];
    for(let i=0;i<4;i++) ln.push({r,c:dir==='left'?i:3-i}); lines.push(ln); } }
  else { for(let c=0;c<4;c++){ const ln=[];
    for(let i=0;i<4;i++) ln.push({r:dir==='up'?i:3-i,c}); lines.push(ln); } }
  return lines; }

function mergeSound(n){ for(let i=0;i<n;i++) tone(330+Math.min(i,4)*90,0.15,'triangle',i*0.05,0.22); }

function move(dir){
  if(!mgRunning||mgLock||mgOver)return;
  const lines=mergeLineCells(dir);
  let moved=false, gained=0; const survivors=[], removing=[];
  for(const cells of lines){
    const tiles=[]; for(const {r,c} of cells){ if(mg[r][c]) tiles.push(mg[r][c]); }
    const groups=[]; let i=0;
    while(i<tiles.length){
      if(i+1<tiles.length && tiles[i].lvl===tiles[i+1].lvl){ groups.push([tiles[i],tiles[i+1]]); i+=2; }
      else { groups.push([tiles[i]]); i++; }
    }
    for(let k=0;k<groups.length;k++){
      const {r,c}=cells[k], g=groups[k], keep=g[0];
      if(keep.r!==r||keep.c!==c) moved=true;
      keep.tr=r; keep.tc=c;
      if(g[1]){ moved=true; const m=g[1]; m.tr=r; m.tc=c; removing.push(m);
        keep.willLvl=keep.lvl+1; survivors.push(keep); gained+=Math.pow(2,keep.willLvl+1); }
    }
  }
  if(!moved)return;
  mgLock=true; mg=emptyGrid();
  for(const t of mgTiles){ t.r=t.tr; t.c=t.tc; setPos(t); }
  setTimeout(()=>{
    for(const m of removing) m.el.remove();
    mgTiles=mgTiles.filter(t=>!removing.includes(t));
    for(const t of survivors){ t.lvl=t.willLvl; updateTileVisual(t);
      t.el.classList.add('pop'); setTimeout(()=>t.el.classList.remove('pop'),220); }
    for(const t of mgTiles) mg[t.r][t.c]=t;
    const merges=survivors.length;
    mgScore+=gained; if(mgScore>mgBest)mgBest=mgScore;
    if(merges>0){ stars+=merges; saveProgress(); }
    updateMergeLabels(); refreshCounters();
    if(merges>0) mergeSound(merges); else tapSound();
    const reachedTop=survivors.some(t=>t.lvl>=TOP);
    if(reachedTop && !mgWon){ mgWon=true; blastSound(); for(let i=0;i<40;i++)confettiPiece();
      say(UI.mergeWin[LANG]); floatText('🌌','#c77bff',innerWidth/2-16,140); }
    spawnTile(); saveMerge();
    const done=()=>{ if(!movesLeft()) endMerge(); else mgLock=false; };
    if(stars>=nextPrizeStars()){ givePrize(()=>{ refreshCounters(); done(); }); }
    else done();
  },140);
}
function movesLeft(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){ const t=mg[r][c]; if(!t)return true;
    if(c<3&&mg[r][c+1]&&mg[r][c+1].lvl===t.lvl)return true;
    if(r<3&&mg[r+1][c]&&mg[r+1][c].lvl===t.lvl)return true; }
  return false;
}
function endMerge(){ mgOver=true; mgLock=true; nopeSound(); tone(150,0.3,'sawtooth',0.05,0.16);
  $('mergeEndTitle').innerHTML='🏆 '+mgScore;
  $('mergeEndSub').textContent=UI.bestScore[LANG]+': '+mgBest;
  $('mergeEnd').classList.add('show'); saveMerge();
  Input.mode='menu'; if(Input.active) setTimeout(focusFirst,0); }

function startMerge(){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume();
  loadProgress();
  $('start').style.display='none'; mergeView.classList.add('show');
  ensureCells(); computeGeom();
  loadMerge();
  mgRunning=true; mgOver=false; mgLock=false; refreshCounters();
  Input.mode='play-merge'; setFocus(null);
  say(UI.mergeGo[LANG]);
}
function stopMerge(){ mgRunning=false; mergeView.classList.remove('show'); $('mergeEnd').classList.remove('show'); }

/* input: swipe + arrow keys */
let msx=0,msy=0,msw=false;
mergeBoard.addEventListener('pointerdown',e=>{ msx=e.clientX; msy=e.clientY; msw=true; });
window.addEventListener('pointerup',e=>{ if(!msw)return; msw=false;
  const dx=e.clientX-msx, dy=e.clientY-msy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left'); else move(dy>0?'down':'up'); });
window.addEventListener('pointercancel',()=>{ msw=false; });
/* arrow/d-pad merge moves are handled by the central Input layer (onNav → move) */
window.addEventListener('resize',()=>{ if(mgRunning) relayout(); });
$('mergeBtn').addEventListener('click',()=>{ tapSound(); startMerge(); });
$('mergeBack').addEventListener('click',()=>{ tapSound(); goHome(); });
$('mergeNew').addEventListener('click',()=>{ tapSound(); newMergeGame(); say(UI.mergeGo[LANG]); });
$('mergeAgain').addEventListener('click',()=>{ tapSound(); newMergeGame(); });

/* ===== WIND GARDEN (a calm musical light-garden) =====
   Touch to plant a glowing flower that blooms with a warm chord; it grows,
   sways on the breeze, then matures and lets a seed drift up to become a
   star in your sky. Drag to trail a melody of blooms. Soft, no fail. */
const gardenView=$('garden'), gcv=$('gardenCanvas');
let gctx=null, gW=0, gH=0, gdpr=1;
let flowers=[], pollen=[], ripples=[], seeds=[], skyStars=[], bgStars=[];
let gRunning=false, gLastT=0, gIdle=0, breeze=0;
let gCur={x:0,y:0,show:false,lpx:0,lpy:0};   // controller cursor (Apple TV / gamepad)
function gardenPlant(){ if(!gRunning)return; plantFlower(gCur.x,gCur.y,true); gCur.lpx=gCur.x; gCur.lpy=gCur.y; gCur.show=true; }
/* C-major pentatonic over three octaves — every note belongs, nothing clashes */
const PENT=[130.81,146.83,164.81,196.00,220.00, 261.63,293.66,329.63,392.00,440.00,
            523.25,587.33,659.25,783.99,880.00, 1046.50,1174.66,1318.51];
function hueFor(idx){ return (256+idx*7)%360; }
function pitchFromY(y){ return Math.max(2,Math.min(PENT.length-5, Math.round(2+(1-y/gH)*(PENT.length-8)))); }

/* ---------- audio: warm chords, a soft pad and a wind bed, through reverb ---------- */
let wgMaster=null, wgBus=null, wgDelay=null, wgPad=[], wgWind=null, wgAudioReady=false;
function wgInitAudio(){ if(!AC||wgAudioReady)return;
  wgMaster=AC.createGain(); wgMaster.gain.value=0.0001; wgMaster.connect(AC.destination);
  wgDelay=AC.createDelay(1.0); wgDelay.delayTime.value=0.30;
  const damp=AC.createBiquadFilter(); damp.type='lowpass'; damp.frequency.value=2400;
  const fb=AC.createGain(); fb.gain.value=0.40;
  wgDelay.connect(damp); damp.connect(fb); fb.connect(wgDelay);
  const wet=AC.createGain(); wet.gain.value=0.45; wgDelay.connect(wet); wet.connect(wgMaster);
  wgBus=AC.createGain(); wgBus.gain.value=1.0; wgBus.connect(wgMaster); wgBus.connect(wgDelay);
  wgAudioReady=true;
}
function wgStartPad(){ if(!AC||!wgAudioReady)return; wgStopPad();
  const t0=AC.currentTime;
  wgMaster.gain.cancelScheduledValues(t0); wgMaster.gain.setValueAtTime(Math.max(wgMaster.gain.value,0.0001),t0);
  wgMaster.gain.linearRampToValueAtTime(0.9,t0+2.5);
  [130.81,164.81,196.00].forEach((f,i)=>{                       // soft C-major drone
    const o=AC.createOscillator(); o.type='sine'; o.frequency.value=f;
    const o2=AC.createOscillator(); o2.type='triangle'; o2.frequency.value=f*1.005;
    const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=700;
    const g=AC.createGain(); g.gain.value=0.05;
    const lfo=AC.createOscillator(); lfo.frequency.value=0.05+i*0.013;
    const lg=AC.createGain(); lg.gain.value=0.03; lfo.connect(lg); lg.connect(g.gain);
    o.connect(lp); o2.connect(lp); lp.connect(g); g.connect(wgMaster);
    o.start(t0); o2.start(t0); lfo.start(t0); wgPad.push(o,o2,lfo);
  });
}
function wgStopPad(){ wgPad.forEach(o=>{try{o.stop();}catch(e){}}); wgPad=[]; }
function wgStartWind(){ if(!AC||!wgAudioReady)return; wgStopWind();
  const len=Math.floor(AC.sampleRate*2), buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*0.5;
  const src=AC.createBufferSource(); src.buffer=buf; src.loop=true;
  const bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=520; bp.Q.value=0.6;
  const g=AC.createGain(); g.gain.value=0.05;
  const lfo=AC.createOscillator(); lfo.frequency.value=0.07; const lg=AC.createGain(); lg.gain.value=0.045;
  lfo.connect(lg); lg.connect(g.gain);
  const lf2=AC.createOscillator(); lf2.frequency.value=0.05; const lg2=AC.createGain(); lg2.gain.value=170;
  lf2.connect(lg2); lg2.connect(bp.frequency);
  src.connect(bp); bp.connect(g); g.connect(wgMaster);
  src.start(); lfo.start(); lf2.start(); wgWind=[src,lfo,lf2];
}
function wgStopWind(){ if(wgWind){ wgWind.forEach(n=>{try{n.stop();}catch(e){}}); wgWind=null; } }
function wgNote(idx,vel){ if(!AC||!wgBus)return; idx=Math.max(0,Math.min(PENT.length-1,idx));
  const f=PENT[idx], t0=AC.currentTime, peak=Math.max(0.0008,vel*0.22);
  const lp=AC.createBiquadFilter(); lp.type='lowpass';
  lp.frequency.setValueAtTime(2400,t0); lp.frequency.exponentialRampToValueAtTime(640,t0+1.0);
  const g=AC.createGain(); g.gain.setValueAtTime(0.0001,t0);
  g.gain.linearRampToValueAtTime(peak,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0007,t0+2.2);
  const o1=AC.createOscillator(); o1.type='triangle'; o1.frequency.value=f;
  const o2=AC.createOscillator(); o2.type='sine'; o2.frequency.value=f*2; const g2=AC.createGain(); g2.gain.value=0.35;
  o1.connect(lp); o2.connect(g2); g2.connect(lp); lp.connect(g); g.connect(wgBus);
  o1.start(t0); o2.start(t0); o1.stop(t0+2.4); o2.stop(t0+2.4);
}
function wgChord(idx,vel){ wgNote(idx,vel); setTimeout(()=>wgNote(idx+2,vel*0.8),70); setTimeout(()=>wgNote(idx+4,vel*0.62),150); }

/* ---------- pre-rendered soft flower sprites (cheap to draw, gentle to look at) ---------- */
const flowerSprites={};
function flowerSprite(hue){ const key=Math.round(hue/8)*8; if(flowerSprites[key])return flowerSprites[key];
  const S=148, c=document.createElement('canvas'); c.width=S; c.height=S; const x=c.getContext('2d');
  const cx=S/2, cy=S/2;
  let g=x.createRadialGradient(cx,cy,0,cx,cy,S*0.5);
  g.addColorStop(0,'hsla('+key+',65%,82%,0.40)'); g.addColorStop(1,'hsla('+key+',65%,82%,0)');
  x.fillStyle=g; x.fillRect(0,0,S,S);
  const petals=6, pr=S*0.19;
  for(let i=0;i<petals;i++){ const a=i/petals*Math.PI*2, px=cx+Math.cos(a)*pr, py=cy+Math.sin(a)*pr;
    const pg=x.createRadialGradient(px,py,0,px,py,S*0.21);
    pg.addColorStop(0,'hsla('+((key+8)%360)+',78%,90%,0.96)');
    pg.addColorStop(0.55,'hsla('+key+',70%,80%,0.55)');
    pg.addColorStop(1,'hsla('+key+',70%,80%,0)');
    x.fillStyle=pg; x.beginPath(); x.arc(px,py,S*0.2,0,7); x.fill(); }
  const cg=x.createRadialGradient(cx,cy,0,cx,cy,S*0.15);
  cg.addColorStop(0,'hsla(46,96%,92%,1)'); cg.addColorStop(0.7,'hsla(42,90%,82%,0.85)'); cg.addColorStop(1,'hsla(42,90%,82%,0)');
  x.fillStyle=cg; x.beginPath(); x.arc(cx,cy,S*0.15,0,7); x.fill();
  flowerSprites[key]=c; return c;
}
function softDot(x,y,r,hue,light,a){ gctx.save(); gctx.shadowBlur=r*2.4; gctx.shadowColor='hsla('+hue+',80%,'+light+'%,'+a+')';
  gctx.fillStyle='hsla('+hue+',82%,'+light+'%,'+a+')'; gctx.beginPath(); gctx.arc(x,y,r,0,7); gctx.fill(); gctx.restore(); }

function wgSize(){ gdpr=Math.min(window.devicePixelRatio||1,2);
  gW=gardenView.clientWidth; gH=gardenView.clientHeight;
  gcv.width=Math.round(gW*gdpr); gcv.height=Math.round(gH*gdpr);
  gctx=gcv.getContext('2d'); gctx.setTransform(gdpr,0,0,gdpr,0,0); }
function wgInitBg(){ bgStars=[]; const n=Math.round(gW*gH/14000);
  for(let i=0;i<n;i++) bgStars.push({x:Math.random()*gW,y:Math.random()*gH,r:Math.random()*1.1+0.4,p:Math.random()*6.28,s:0.6+Math.random()}); }

function plantFlower(x,y,big){
  const idx=pitchFromY(y), hue=hueFor(idx);
  flowers.push({x,y,hue,idx,grow:0,age:0,phase:Math.random()*6.28,
    base:(big?60:34)+Math.random()*(big?26:14),mature:false,fade:1});
  if(flowers.length>34){ const f=flowers.shift(); if(!f.mature) releaseSeed(f); }
  ripples.push({x,y,r:5,maxR:(big?118:66),hue,life:1.1,maxLife:1.1});
  for(let i=0;i<(big?5:2);i++) pollen.push({x,y,vx:(Math.random()-0.5)*24,vy:-8-Math.random()*16,
    hue,r:1.6+Math.random()*1.8,life:3+Math.random()*2,maxLife:5,tw:Math.random()*6.28});
  if(big) wgChord(idx,0.55); else wgNote(idx,0.42);
}
function releaseSeed(f){ seeds.push({x:f.x,y:f.y,vy:-26,hue:f.hue,life:4,idx:f.idx});
  stars+=1; saveProgress(); refreshCounters(); }

function wgStep(dt,now){
  breeze=Math.sin(now*0.00018)*0.6+Math.sin(now*0.00007)*0.45;
  if(Input.mode==='play-garden' && (Math.abs(Input.ax)>0.02||Math.abs(Input.ay)>0.02)){
    gCur.x=Math.max(6,Math.min(gW-6,gCur.x+Input.ax*440*dt));
    gCur.y=Math.max(6,Math.min(gH-6,gCur.y+Input.ay*440*dt)); gCur.show=true; gIdle=0;
    if(Input.confirmHeld && Math.hypot(gCur.x-gCur.lpx,gCur.y-gCur.lpy)>40){ plantFlower(gCur.x,gCur.y,false); gCur.lpx=gCur.x; gCur.lpy=gCur.y; } }
  gIdle+=dt; if(gIdle>4.5){ gIdle=0; if(flowers.length<7) plantFlower(40+Math.random()*(gW-80),gH*0.35+Math.random()*gH*0.4,false); }
  for(let i=flowers.length-1;i>=0;i--){ const f=flowers[i]; f.age+=dt; f.grow+=(1-f.grow)*Math.min(1,dt*2.6);
    if(f.mature){ f.fade-=dt*0.7; if(f.fade<=0)flowers.splice(i,1); }
    else { if(f.age>13){ f.mature=true; releaseSeed(f); }
      else if(Math.random()<dt*0.7) pollen.push({x:f.x+(Math.random()-0.5)*f.base,y:f.y+(Math.random()-0.5)*f.base,
        vx:(Math.random()-0.5)*10,vy:-6-Math.random()*10,hue:f.hue,r:1.3+Math.random()*1.5,life:3+Math.random()*2,maxLife:5,tw:Math.random()*6.28}); } }
  for(let i=pollen.length-1;i>=0;i--){ const p=pollen[i]; p.vx+=breeze*9*dt; p.vy+=-2*dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; p.tw+=dt*3; if(p.life<=0||p.y<-20)pollen.splice(i,1); }
  for(let i=ripples.length-1;i>=0;i--){ const r=ripples[i]; r.r+=(r.maxR-r.r)*Math.min(1,dt*3.2); r.life-=dt; if(r.life<=0)ripples.splice(i,1); }
  for(let i=seeds.length-1;i>=0;i--){ const s=seeds[i]; s.vy-=24*dt; s.y+=s.vy*dt; s.x+=breeze*16*dt; s.life-=dt;
    if(s.y<gH*0.16||s.life<=0){ skyStars.push({x:s.x,y:Math.max(14,s.y),r:1.3+Math.random()*1.2,hue:s.hue,p:Math.random()*6.28});
      if(skyStars.length>90)skyStars.shift(); wgNote(Math.min(PENT.length-1,s.idx+5),0.18); seeds.splice(i,1); } }
}
function wgDraw(now){
  if(!gctx)return;
  gctx.clearRect(0,0,gW,gH);   // the CSS twilight gradient shows through
  for(const b of bgStars){ const a=0.25+0.3*(0.5+0.5*Math.sin(now*0.001*b.s+b.p));
    gctx.fillStyle='rgba(255,250,240,'+a+')'; gctx.beginPath(); gctx.arc(b.x,b.y,b.r,0,7); gctx.fill(); }
  for(const s of skyStars){ const a=0.55+0.4*(0.5+0.5*Math.sin(now*0.0015+s.p)); softDot(s.x,s.y,s.r,s.hue,88,a); }
  for(const r of ripples){ const a=Math.max(0,r.life/r.maxLife);
    gctx.save(); gctx.globalAlpha=a*0.5; gctx.shadowBlur=10; gctx.shadowColor='hsla('+r.hue+',80%,85%,'+a+')';
    gctx.strokeStyle='hsla('+r.hue+',75%,86%,'+(a*0.8)+')'; gctx.lineWidth=2; gctx.beginPath(); gctx.arc(r.x,r.y,r.r,0,7); gctx.stroke(); gctx.restore(); }
  for(const p of pollen){ const a=Math.max(0,Math.min(1,p.life/1.2))*(0.5+0.5*Math.sin(p.tw))*0.7; if(a>0.02) softDot(p.x,p.y,p.r,p.hue,86,a); }
  for(const f of flowers){ const s=f.base*2*f.grow*(0.96+0.04*Math.sin(now*0.0022+f.phase));
    const sway=Math.sin(now*0.001+f.phase)*6*f.grow;
    gctx.globalAlpha=Math.max(0,f.fade); gctx.drawImage(flowerSprite(f.hue), f.x-s/2+sway, f.y-s/2, s, s); gctx.globalAlpha=1; }
  for(const s of seeds){ const a=Math.max(0,Math.min(1,s.life/1.5)); softDot(s.x,s.y,2.6,s.hue,90,a); }
  if(gCur.show && Input.mode==='play-garden'){ gctx.save(); gctx.shadowBlur=12; gctx.shadowColor='rgba(255,246,224,0.85)';
    gctx.strokeStyle='rgba(255,250,235,0.9)'; gctx.lineWidth=2; gctx.beginPath(); gctx.arc(gCur.x,gCur.y,15,0,7); gctx.stroke();
    gctx.fillStyle='rgba(255,250,235,0.95)'; gctx.beginPath(); gctx.arc(gCur.x,gCur.y,2.4,0,7); gctx.fill(); gctx.restore(); }
}
function wgLoop(ts){ if(!gRunning)return; const now=ts||performance.now();
  const dt=Math.min((now-gLastT)/1000||0,0.05); gLastT=now; wgStep(dt,now); wgDraw(now); requestAnimationFrame(wgLoop); }

/* --- input: touch plants a bloom; drag trails a melody of blooms --- */
let gDown=false, gLastX=0, gLastY=0;
function gPos(e){ const r=gcv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
gcv.addEventListener('pointerdown',e=>{ gDown=true; gIdle=0; const p=gPos(e); gLastX=p.x; gLastY=p.y; plantFlower(p.x,p.y,true); });
gcv.addEventListener('pointermove',e=>{ if(!gDown)return; const p=gPos(e); gIdle=0;
  if(Math.hypot(p.x-gLastX,p.y-gLastY)>36){ plantFlower(p.x,p.y,false); gLastX=p.x; gLastY=p.y; } });
window.addEventListener('pointerup',()=>{ gDown=false; });
window.addEventListener('pointercancel',()=>{ gDown=false; });
window.addEventListener('resize',()=>{ if(gRunning){ wgSize(); wgInitBg(); } });

function startGarden(){
  initAudio(); if(AC&&AC.state==='suspended')AC.resume(); wgInitAudio();
  loadProgress();
  $('start').style.display='none'; gardenView.classList.add('show');
  wgSize(); wgInitBg();
  flowers=[]; pollen=[]; ripples=[]; seeds=[]; skyStars=[]; gIdle=3; gRunning=true; gLastT=performance.now();
  gCur={x:gW/2,y:gH/2,show:false,lpx:gW/2,lpy:gH/2}; Input.mode='play-garden'; setFocus(null);
  refreshCounters();
  $('gardenHint').classList.remove('hide'); setTimeout(()=>$('gardenHint').classList.add('hide'),5200);
  wgStartPad(); wgStartWind(); say(UI.gardenGo[LANG]);
  setTimeout(()=>{ if(gRunning) plantFlower(gW*0.5,gH*0.45,true); },700);
  requestAnimationFrame(wgLoop);
}
function stopGarden(){ gRunning=false; gardenView.classList.remove('show'); wgStopPad(); wgStopWind();
  if(wgMaster&&AC){ try{ const t0=AC.currentTime; wgMaster.gain.cancelScheduledValues(t0);
    wgMaster.gain.setValueAtTime(Math.max(wgMaster.gain.value,0.0001),t0); wgMaster.gain.linearRampToValueAtTime(0.0001,t0+0.6); }catch(e){} } }
$('gardenBtn').addEventListener('click',()=>{ tapSound(); startGarden(); });
$('gardenBack').addEventListener('click',()=>{ tapSound(); goHome(); });
$('gardenShelf').addEventListener('click',()=>{ tapSound(); openShelf(); });

/* ===== INPUT: game controllers + keyboard (couch / Apple TV play) =====
   Realtime games read Input.ax / Input.ay (analog, -1..1). Menus use spatial
   focus navigation: a highlight you move with the d-pad/stick, A/Enter to pick. */
const Input={mode:'menu',active:false,ax:0,ay:0,confirmHeld:false,_resume:'menu'};
const FOCUS_SEL='.menubtn,.playbtn,.topbtn,.pillbtn,.tile,.groupbox,.pad,.slot.vehicle.got,.langtoggle button';
let focusEl=null;
function isVisible(el){ const rs=el.getClientRects(); if(!rs.length)return false;
  const cs=getComputedStyle(el); if(cs.visibility==='hidden'||cs.display==='none'||cs.opacity==='0')return false;
  if(el.disabled)return false; const r=rs[0];
  return r.width>2&&r.height>2&&r.right>0&&r.bottom>0&&r.left<innerWidth&&r.top<innerHeight; }
function focusables(){ return [...document.querySelectorAll(FOCUS_SEL)].filter(isVisible); }
function setFocus(el){ if(focusEl&&focusEl!==el)focusEl.classList.remove('kbfocus');
  focusEl=el||null; if(focusEl&&Input.active){ focusEl.classList.add('kbfocus'); try{focusEl.scrollIntoView({block:'nearest'});}catch(e){} } }
function focusFirst(){ const it=focusables(); if(it.length)setFocus(it[0]); }
function focusBoardFirst(){ const t=board.querySelector('.tile,.groupbox'); if(t)setFocus(t); else focusFirst(); }
function markActive(){ if(!Input.active){ Input.active=true; document.body.classList.add('usepad'); }
  if(focusEl)focusEl.classList.add('kbfocus'); }
function navigate(dir){ const D={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[dir]; if(!D)return;
  const items=focusables(); if(!items.length)return;
  if(!focusEl||!isVisible(focusEl)||items.indexOf(focusEl)<0){ setFocus(items[0]); return; }
  const fr=focusEl.getBoundingClientRect(), fx=fr.left+fr.width/2, fy=fr.top+fr.height/2;
  let best=null, bs=1e12;
  for(const el of items){ if(el===focusEl)continue; const r=el.getBoundingClientRect();
    const ox=(r.left+r.width/2)-fx, oy=(r.top+r.height/2)-fy;
    const along=D[0]?ox*D[0]:oy*D[1]; if(along<=2)continue;
    const perp=D[0]?Math.abs(oy):Math.abs(ox); const score=along+perp*2.2;
    if(score<bs){bs=score;best=el;} }
  if(best)setFocus(best); }
function activateFocus(){ if(!focusEl||!isVisible(focusEl))return;
  if(focusEl.classList.contains('pad')) onPadTap(+focusEl.dataset.idx); else focusEl.click(); }

function onNav(d){ const M=Input.mode;
  if(M==='menu') navigate(d);
  else if(M==='play-merge') move(d); }
function onConfirm(){ const M=Input.mode;
  if(M==='menu') activateFocus();
  else if(M==='play-tower') dropBlock();
  else if(M==='play-garden') gardenPlant(); }
function onBack(){ if($('shelf').classList.contains('show')){ tapSound(); closeShelf(); return; }
  if($('start').style.display!=='none')return; tapSound(); goHome(); }

const KEYMAP={ArrowUp:'up',KeyW:'up',ArrowDown:'down',KeyS:'down',ArrowLeft:'left',KeyA:'left',
  ArrowRight:'right',KeyD:'right',Enter:'confirm',Space:'confirm',NumpadEnter:'confirm',Escape:'back',Backspace:'back'};
const keyState={};
addEventListener('keydown',e=>{ const a=KEYMAP[e.code]; if(!a)return; e.preventDefault(); keyState[a]=true; markActive(); });
addEventListener('keyup',e=>{ const a=KEYMAP[e.code]; if(a)keyState[a]=false; });

function readRaw(){ let cf=!!keyState.confirm, bk=!!keyState.back, ax=0, ay=0;
  if(keyState.left)ax-=1; if(keyState.right)ax+=1; if(keyState.up)ay-=1; if(keyState.down)ay+=1;
  const pads=navigator.getGamepads?navigator.getGamepads():[];
  for(const gp of pads){ if(!gp)continue; const b=gp.buttons, A=gp.axes, pr=i=>b[i]&&b[i].pressed;
    if(pr(0))cf=true; if(pr(1)||pr(9))bk=true;
    if(pr(14))ax-=1; if(pr(15))ax+=1; if(pr(12))ay-=1; if(pr(13))ay+=1;
    if(A&&A.length>=2){ if(Math.abs(A[0])>0.28)ax+=A[0]; if(Math.abs(A[1])>0.28)ay+=A[1]; } }
  return {cf,bk,ax:Math.max(-1,Math.min(1,ax)),ay:Math.max(-1,Math.min(1,ay))}; }

const NAV=['up','down','left','right']; let prevNav={}, prevCf=false, prevBk=false, navHeld={}, lastPoll=0;
function pollInput(ts){ const now=ts||performance.now(); const dt=Math.min((now-lastPoll)/1000||0,0.05); lastPoll=now;
  const r=readRaw(); Input.ax=r.ax; Input.ay=r.ay; Input.confirmHeld=r.cf;
  if(r.ax||r.ay||r.cf||r.bk) markActive();
  const nav={up:r.ay<-0.5,down:r.ay>0.5,left:r.ax<-0.5,right:r.ax>0.5};
  for(const d of NAV){ if(nav[d]){ if(!prevNav[d]){navHeld[d]=0;onNav(d);} else {navHeld[d]+=dt; if(navHeld[d]>0.42){navHeld[d]-=0.13;onNav(d);}} } }
  if(r.cf&&!prevCf) onConfirm();
  if(r.bk&&!prevBk) onBack();
  prevNav=nav; prevCf=r.cf; prevBk=r.bk; requestAnimationFrame(pollInput); }
requestAnimationFrame(pollInput);

function cxToast(msg){ const t=$('cxToast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
addEventListener('gamepadconnected',()=>{ markActive(); document.body.classList.add('tv');
  if(Input.mode==='menu') focusFirst();
  cxToast(LANG==='es'?'🎮 ¡Control conectado!':'🎮 Controller connected!'); });

document.addEventListener('visibilitychange',()=>{ if(!document.hidden&&AC&&AC.state==='suspended')AC.resume(); });
setLang('es');

/* ===== PWA: register service worker for offline + installable ===== */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
